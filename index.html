<!DOCTYPE html> 
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOPQ恒星演化模拟器</title>
    <style>
.top-nav {
    background: #151535;
    border-bottom: 2px solid #2a2a55;
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.nav-container {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: #ff8e53; 
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: default;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
}

.nav-links li a {
    text-decoration: none;
    color: #d0d0e8;
    font-size: 1rem;
    transition: 0.3s;
    font-weight: 500;
}

.nav-links li a:hover {
    color: #ff8e53;
}

.nav-links li a.active {
    color: #ff8e53;
    border-bottom: 2px solid #ff8e53;
    padding-bottom: 5px;
}
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #0b0b1f; color: #e6e6f0; padding: 20px; }
        #app { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 24px; background: linear-gradient(135deg, #151535, #202045); border-radius: 10px; margin-bottom: 24px; }
        header h1 { color: #ff8e53; font-size: 2.4rem; margin-bottom: 8px; }
        .main-content { display: flex; gap: 20px; margin-bottom: 24px; }
        .control-panel, .visualization, .status-bar { background: #151535; padding: 22px; border-radius: 10px; }
        .control-panel { flex: 1; }
        .visualization { flex: 2; text-align: center; }
        h2 { color: #ff8e53; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #2a2a55; }
        
        .input-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; color: #d0d0e8; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; background: #222244; border: 1px solid #333366; border-radius: 6px; color: #fff; }
        
        .btn-box { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { background: #ff8e53; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; min-width: 80px;}
        button:hover { background: #2277dd; }
        .btn-save { background: #44aa44; }
        .btn-load { background: #4444aa; position: relative; overflow: hidden; }
        #file-input { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

        .star-display { min-height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
        .star { width: 100px; height: 100px; border-radius: 50%; transition: all 0.6s ease; position: relative; }
        .star-status { position: absolute; bottom: -30px; color: #ff8e53; font-size: 1.2rem; font-weight: bold; width: 100%; }

        .parameters-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .param-card { background: #222244; padding: 16px; border-radius: 8px; text-align: center; }
        .param-val { color: #66d9ff; font-size: 1.6rem; font-weight: bold; margin: 5px 0; }

        .star-news { margin-top: 20px; background: #222244; border-radius: 8px; padding: 16px; text-align: left; height: 180px; overflow-y: auto; font-size: 0.9rem; }
        .news-item { border-bottom: 1px solid #333366; padding: 5px 0; }
        @keyframes supernova { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(5); opacity: 0.5; filter: brightness(3); } 100% { transform: scale(10); opacity: 0; } }
        .exploding { animation: supernova 2s forwards; }
        footer { text-align: center; margin-top: 40px; color: #555588; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="app">
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo">NOPQ</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="help.html" class="active">帮助</a></li>
            </ul>
        </div>
    </nav>
    <header>
        <h1>NOPQ恒星演化模拟器</h1>
        <p>SFCORE星流核心 荣誉出品</p>
    </header>

    <div class="main-content">
        <div class="control-panel">
            <h2>新建恒星</h2>
            <div class="input-group">
                <label>名称</label>
                <input type="text" id="star-name" value="My_Star">
            </div>
            <div class="input-group">
                <label>初始光谱型</label>
                <select id="star-type" onchange="applyTypePreset()">
                    <option value="O">O型主序星</option>
                    <option value="B">B型主序星</option>
                    <option value="A">A型主序星</option>
                    <option value="F">F型主序星</option>
                    <option value="G" selected>G型主序星</option>
                    <option value="K">K型主序星</option>
                    <option value="M">M型主序星</option>
                </select>
            </div>
            <div class="input-group">
                <label>初始质量 (M☉)</label>
                <input type="number" id="initial-mass" step="0.1" value="1.0">
            </div>
            
            <div class="input-group">
                <label>备注</label>
                <input type="text" id="note" value="这是备注">
            </div>

            <div class="btn-box">
                <button onclick="initNewStar()">初始化</button>
                <button id="play-btn" onclick="toggleSim()">播放</button>
            </div>

            <div class="btn-box">
                <button class="btn-save" onclick="saveToNOPQ()">保存 .nopq</button>
                <button class="btn-load">
                    载入本地 .nopq
                    <input type="file" id="file-input" accept=".nopq" onchange="loadFromNOPQ(event)">
                </button>
            </div>
        </div>

        <div class="visualization">
            <h2>演化可视化</h2>
            <div class="star-display">
                <div id="star-visual" class="star"></div>
                <div id="star-status-text" class="star-status">未就绪</div>
            </div>
            <br><br>
            <h2>恒星新闻（仅供娱乐）</h2>
            <div class="star-news" id="news-container">
                <div class="news-item">系统就绪，请初始化恒星。</div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <h2>物理参数</h2>
        <div class="parameters-grid">
            <div class="param-card"><div>当前质量 (M☉)</div><div id="v-mass" class="param-val">--</div></div>
            <div class="param-card"><div>绝对光度 (L☉)</div><div id="v-lum" class="param-val">--</div></div>
            <div class="param-card"><div>表面温度 (K)</div><div id="v-temp" class="param-val">--</div></div>
            <div class="param-card"><div>已演化时间 (Myr)</div><div id="v-time" class="param-val">--</div></div>
        </div>
    </div>

    <footer>
        &copy; 2026 SFCORE 星流核心. All Rights Reserved. 保留所有权利。
    </footer>
</div>

<script>
const PRESETS = {
    'O': { m: 40, t: 35000, c: '#9bb0ff' },
    'B': { m: 10, t: 15000, c: '#aabfff' },
    'A': { m: 2.1, t: 8500, c: '#cad7ff' },
    'F': { m: 1.4, t: 6500, c: '#f8f7ff' },
    'G': { m: 1.0, t: 5778, c: '#ffe91f' },
    'K': { m: 0.7, t: 4500, c: '#ffe2cf' },
    'M': { m: 0.3, t: 3200, c: '#ffcc6f' }
};

const RANDOM_NEWS = [
    "该恒星表面发生中等规模耀斑",
    "一颗流浪行星进入恒星系，轨道半径约4.32AU",
    "恒星系内两颗小行星碰撞，形成新的小行星带",
    "天文学家观测到该恒星周围出现行星形成盘",
    "该恒星释放高能粒子流，影响系内行星磁场",
    "该恒星质量损失速率小幅上升",
    "恒星系诞生了一颗新的气态巨行星",
    "系外探测器发现该恒星系统存在宜居带行星",
    "该恒星表面温度波动，核心氢燃烧速率变化",
    "该恒星捕获了一颗小型褐矮星，成为双星系统",
    "一个系外文明探测了该恒星系",
    "离该恒星系7.8光年处的两个系外文明发生了战争",
];

let state = {
    version: "1.5",
    name: "My_Star",
    type: "G",
    age: 0,
    m0: 1.0,
    mass: 1.0,
    lum: 1.0,
    temp: 5778,
    radius: 1.0,
    stage: 'main',
    ms_life: 10000,
    timer: null,
    lastNewsAge: 0, 
    note: "这是备注"
};

function applyTypePreset() {
    const type = document.getElementById('star-type').value;
    document.getElementById('initial-mass').value = PRESETS[type].m;
}

function initNewStar() {
    state.version = "1.5.1";
    state.name = document.getElementById('star-name').value;
    state.type = document.getElementById('star-type').value;
    state.m0 = parseFloat(document.getElementById('initial-mass').value);
    state.mass = state.m0;
    state.age = 0;
    state.lastNewsAge = 0;
    state.stage = 'main';
    state.radius = 1.0;
    state.ms_life = 10000 * Math.pow(state.m0, -2.5);
    state.note = document.getElementById('note'.value);
    updatePhysics();
    logNews(`恒星 ${state.name} 诞生。预期主序寿命: ${state.ms_life.toFixed(1)} 百万年。`);
    if (state.mass > 25){
    	logNews(`注: ${state.name} 会演化成沃尔夫-拉耶星！`); //粗糙的判断
    }
    updateUI();
}
function updatePhysics() {
    if (state.stage === 'main') {
        state.lum = Math.pow(state.mass, 3.5);
        state.temp = PRESETS[state.type].t * (1 + (state.age / state.ms_life) * 0.1);
    }
}

function toggleSim() {
    if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
        document.getElementById('play-btn').textContent = "播放";
    } else {
        state.timer = setInterval(step, 100);
        document.getElementById('play-btn').textContent = "暂停";
    }
}

function step() {
    const dt = state.ms_life * 0.005; 
    state.age += dt;
    var xinwen = state.age/state.ms_life;
    if (state.stage === 'main') {
        state.mass -= (state.m0 * 0.00001) * (state.age / (state.ms_life / 10));
        updatePhysics();

        if (state.age >= state.ms_life) {
            state.stage = 'giant';
            logNews("警告：核心氢枯竭！进入巨星阶段。");
        }
	} else if (state.stage === 'giant') {

    	state.radius += 0.3; 
    	state.temp *= 0.98;
    	state.lum *= 1.15;

    	if (state.m0 > 25 && state.radius > 20 && state.stage !== 'wr') {
        	state.stage = 'wr';
        	state.radius = 3;
        	state.temp = 80000;
       		state.lum = Math.pow(state.mass, 3.8);
        	logNews("恒星外层被强烈恒星风剥离！演化为WR星（沃尔夫-拉叶星）！");
        	return;
    	}

    	if (state.radius > 30) finishEvolution();
	}else if (state.stage === 'wr') {

    	    state.mass -= 0.5 * (state.ms_life * 0.005 / state.ms_life);

    	    if (state.mass < 8) state.mass = 8;

            state.temp *= 1.01;  
    	    state.lum = Math.pow(state.mass, 3.8);
    	    state.radius *= 0.99;     

    	    if (state.radius < 1.5) {
        	finishEvolution();
    	    }
	}

    if (xinwen % 0.05 == 0) {
        triggerRandomNews();
    }

    updateUI();
}

function triggerRandomNews() {
    if (RANDOM_NEWS.length > 0 && RANDOM_NEWS[0] !== "") {
        const msg = RANDOM_NEWS[Math.floor(Math.random() * RANDOM_NEWS.length)];
        logNews(`[新闻] ${msg}`);
    }
}

function finishEvolution() {
    clearInterval(state.timer);
    state.timer = null;
    document.getElementById('star-visual').classList.add('exploding');
    setTimeout(() => {
        state.stage = 'remnant';
        document.getElementById('star-visual').classList.remove('exploding');
        if (state.m0 > 20){
        	state.mass = 999999999 ; state.temp = 0 ; state.lum = 0; state.radius = 0.01;
        	logNews("超新星爆发，整片星系被照亮！形成黑洞。")
        }else if (state.m0 > 8 && state.m0 <= 20) {
            state.temp = 100000; state.lum = 0.1; state.radius = 0.1;
            logNews("超新星爆发，整片星系被照亮！形成中子星。");
        } else {
            state.temp = 30000; state.lum = 0.01; state.radius = 0.2;
            logNews("形成白矮星。");
        }
        updateUI();
    }, 2000);
}

function saveToNOPQ() {
    const dataStr = JSON.stringify(state, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `${state.name}.nopq`;
    link.click();
    URL.revokeObjectURL(url);
}

function loadFromNOPQ(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            state = JSON.parse(e.target.result);
            state.timer = null;
            document.getElementById('play-btn').textContent = "播放";
            document.getElementById('star-name').value = state.name;
            document.getElementById('star-type').value = state.type;
            document.getElementById('initial-mass').value = state.m0;
            document.getElementById('note').value = state.notes;
            logNews(`载入档案：${state.name}`);
            updateUI();
        } catch (err) { alert("非法格式，你这是违法行为！"); }
    };
    reader.readAsText(file);
}

function updateUI() {
    document.getElementById('v-mass').textContent = state.mass.toFixed(3);
    document.getElementById('v-lum').textContent = state.lum.toFixed(2);
    document.getElementById('v-temp').textContent = Math.round(state.temp);
    document.getElementById('v-time').textContent = state.age.toFixed(1);

    const visual = document.getElementById('star-visual');
    let color = getTempColor(state.temp);
    let size = state.stage === 'remnant' ? 15 : 40 + (state.radius * 6);

    visual.style.backgroundColor = color;
    visual.style.width = size + 'px';
    visual.style.height = size + 'px';
    visual.style.boxShadow = `0 0 ${size/1.5}px ${color}`;
    
    const stageNames = { 
    	'main': '主序星', 
    	'giant': '超巨星阶段',
    	'wr': 'WR星阶段',
    	'remnant': '演化残骸' 
	};
    document.getElementById('star-status-text').textContent = `${state.name} [${stageNames[state.stage]}]`;
}

function getTempColor(t) {
    if (t > 25000) return '#9bb0ff';
    if (t > 10000) return '#cad7ff';
    if (t > 5500) return '#ffe91f';
    if (t > 3500) return '#ffcc6f';
    return '#ff5500';
}

function logNews(msg) {
    const container = document.getElementById('news-container');
    const div = document.createElement('div');
    div.className = 'news-item';
    div.innerHTML = `<span style="color:#888">[T+${state.age.toFixed(0)}]</span> ${msg}`;
    container.prepend(div);
}
window.onload = applyTypePreset;
</script>
</body>
</html>
