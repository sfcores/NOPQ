<!DOCTYPE html> 
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="language" content="zh-CN">
    <meta name="author" content="Sfcore">
    <meta name="description" content="NOPQ - 恒星演化模拟器">
    <meta name="keywords" content="NOPQ,恒星演化模拟器,星流核心,SFCORE">
    <meta name="robots" content="All">
    <title>NOPQ恒星演化模拟器</title>
    <link rel="icon" type="image/png" sizes="32x32" href="NOPQ-ICON.png">
    <style>
.top-nav { background: #151535; border-bottom: 2px solid #2a2a55; padding: 0 20px; height: 60px; display: flex; align-items: center; margin-bottom: 20px; }
.nav-container { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { color: #ff8e53; font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; cursor: default; }
.nav-links { list-style: none; display: flex; gap: 30px; }
.nav-links li a { text-decoration: none; color: #d0d0e8; font-size: 1rem; transition: 0.3s; font-weight: 500; }
.nav-links li a:hover { color: #ff8e53; }
.nav-links li a.active { color: #ff8e53; border-bottom: 2px solid #ff8e53; padding-bottom: 5px; }
.back-link { display: inline-block; margin-top: 24px; text-decoration: none; color: #ff8e53; font-weight: 500; }
.back-link:hover { color: #2277dd; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
body { background: #0b0b1f; color: #e6e6f0; padding: 20px; }
#app { max-width: 1200px; margin: 0 auto; }
header { text-align: center; padding: 24px; background: linear-gradient(135deg, #151535, #202045); border-radius: 10px; margin-bottom: 24px; }
header h1 { color: #ff8e53; font-size: 2.4rem; margin-bottom: 8px; }
.main-content { display: flex; gap: 20px; margin-bottom: 24px; }
.control-panel, .visualization, .status-bar { background: #151535; padding: 22px; border-radius: 10px; }
.control-panel { flex: 1; }
.visualization { flex: 2; text-align: center; }
h2 { color: #ff8e53; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #2a2a55; }
.input-group { margin-bottom: 14px; }
label { display: block; margin-bottom: 6px; color: #d0d0e8; font-size: 0.9rem; }
input, select, textarea { width: 100%; padding: 10px; background: #222244; border: 1px solid #333366; border-radius: 6px; color: #fff; resize: none; }
textarea { height: 80px; font-size: 0.9rem; }
.btn-box { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
button { background: #ff8e53; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; min-width: 80px;}
button:hover { background: #2277dd; }
.btn-save { background: #44aa44; }
.btn-load { background: #4444aa; position: relative; overflow: hidden; }
#file-input { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
.star-display { min-height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
.star { width: 100px; height: 100px; border-radius: 50%; transition: all 0.6s ease; position: relative; }
.star-status { position: absolute; bottom: -30px; color: #ff8e53; font-size: 1.2rem; font-weight: bold; width: 100%; }
.parameters-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.param-card { background: #222244; padding: 16px; border-radius: 8px; text-align: center; }
.param-val { color: #66d9ff; font-size: 1.6rem; font-weight: bold; margin: 5px 0; }
.star-news { margin-top: 20px; background: #222244; border-radius: 8px; padding: 16px; text-align: left; height: 180px; overflow-y: auto; font-size: 0.9rem; }
.news-item { border-bottom: 1px solid #333366; padding: 5px 0; }
@keyframes supernova { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(5); opacity: 0.5; filter: brightness(3); } 100% { transform: scale(10); opacity: 0; } }
.exploding { animation: supernova 2s forwards; }
footer { text-align: center; margin-top: 40px; color: #555588; font-size: 0.8rem; }
    </style>
</head>
<body>
<div id="app">
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo">NOPQ</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="help.html" class="active">帮助</a></li>
            </ul>
        </div>
    </nav>
    <header>
        <h1>NOPQ恒星演化模拟器</h1>
        <p>v1.7.3 NOPQ模拟器正在和<a class="back-link" href="https://upb.m82.org">《行星球宇宙》</a>联动！</p>
    </header>
    <div class="main-content">
        <div class="control-panel">
            <h2>新建恒星</h2>
            <div class="input-group">
                <label>名称</label>
                <input type="text" id="star-name" value="My_Star">
            </div>
            <div class="input-group">
                <label>初始质量 (M☉)</label>
                <input type="number" id="initial-mass" step="0.1" value="1.0" onchange="autoSetSpectralType()">
            </div>
            <div class="input-group">
                <label>金属丰度</label>
                <select id="star-metallicity">
                    <option value="low">低金属丰度</option>
                    <option value="mid" selected>中金属丰度</option>
                    <option value="high">高金属丰度</option>
                </select>
            </div>
            <div class="input-group">
                <label>恒星种类</label>
                <select id="star-category">
                    <option value="normal" selected>普通恒星/褐矮星</option>
                    <option value="carbon">碳星 (C)</option>
                    <option value="blue_straggler">蓝离散星 (BSS)</option>
                </select>
            </div>
            <div class="input-group">
                <label>备注</label>
                <textarea id="star-notes" placeholder="输入恒星备注信息..."></textarea>
            </div>
            <div class="btn-box">
                <button onclick="initNewStar()">初始化</button>
                <button id="play-btn" onclick="toggleSim()">播放</button>
            </div>
            <div class="btn-box">
                <button class="btn-save" onclick="saveToNOPQ()">保存 .nopq</button>
                <button class="btn-load">
                    载入本地 .nopq
                    <input type="file" id="file-input" accept=".nopq" onchange="loadFromNOPQ(event)">
                </button>
            </div>
        </div>
        <div class="visualization">
            <h2>演化可视化</h2>
            <div class="star-display">
                <div id="star-visual" class="star"></div>
                <div id="star-status-text" class="star-status">未就绪</div>
            </div>
            <br><br>
            <h2>恒星新闻</h2>
            <div class="star-news" id="news-container">
                <div class="news-item">系统就绪，请初始化恒星。</div>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <h2>物理参数</h2>
        <div class="parameters-grid">
            <div class="param-card"><div>当前质量 (M☉)</div><div id="v-mass" class="param-val">--</div></div>
            <div class="param-card"><div>绝对光度 (L☉)</div><div id="v-lum" class="param-val">--</div></div>
            <div class="param-card"><div>表面温度 (K)</div><div id="v-temp" class="param-val">--</div></div>
            <div class="param-card"><div>已演化时间 (Myr)</div><div id="v-time" class="param-val">--</div></div>
            <div class="param-card"><div>真实半径 (R☉)</div><div id="v-real-radius" class="param-val">--</div></div>
            <div class="param-card"><div>详细光谱型（尚不完善）</div><div id="v-detailed-spectral" class="param-val">--</div></div>
        </div>
    </div>
    <footer>
        Nightsky Objects Pre-simulation Quest<br>
        &copy; 2026 SFCORE 星流核心 和 一颗拿着钻石剑的太阳 联合出品
    </footer>
</div>
<script src="sm.js">

</script>
</body>
</html>
